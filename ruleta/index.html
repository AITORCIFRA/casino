<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ruleta del Pana</title>
  <link rel="stylesheet" href="ruleta.css">
</head>
<body>

  <div class="ruleta-container">

    <h1 class="titulo">🎡 Ruleta del Pana</h1>

    <div class="panel-superior">
      <div class="left">👤 <span id="nickDisplay">Invitado</span></div>
      <div class="right">💰 <span id="saldo">100</span>€</div>
    </div>

    <div class="ruleta">
      <img src="assets/img/ruleta.png" class="ruleta-img" id="ruletaImg">
      <div class="bola" id="bola"></div>
    </div>

    <button id="lanzarBtn" class="btn">LANZAR BOLA</button>

    <h2>RESULTADOS</h2>
    <div id="historial" class="historial"></div>

    <h2>Apuesta</h2>
    <input type="number" id="apuesta" placeholder="Cantidad (€)" min="1">

    <h2>Selecciona tu número</h2>
    <div class="tapete" id="tapete">
#<!-- Se generan los 37 números automáticamente -->
    </div>

    <button id="apostarBtn" class="btn">APOSTAR</button>

  </div>

  <script src="ruleta.js"></script>
</body>
</html>
