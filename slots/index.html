<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Casino del Pana</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="machine">
    <div class="header">🏛️ Casino del Pana</div>

    <div class="screen">
      <div class="reels">
        <div class="reel" id="reel1"></div>
        <div class="reel" id="reel2"></div>
        <div class="reel" id="reel3"></div>
      </div>
      <div class="message" id="message">Inserta apuesta y pulsa GIRAR</div>
    </div>

    <div class="controls">
      <input type="number" id="bet" placeholder="Apuesta (€)" min="1">
      <button id="spinBtn">GIRAR</button>
    </div>

    <div class="bottom-panel">
      <div class="left">👤 <span id="nickDisplay">Invitado</span></div>
      <div class="right">💰 <span id="saldo">100</span>€</div>
    </div>

    <button id="changeNick">Cambiar Nick</button>
    <button id="openShop">🛒 Tienda</button>
  </div>

  <!-- TIENDA -->
  <div id="shop" class="shop hidden">
    <h2>🛒 Tienda</h2>
    <p>Compra saldo extra:</p>

    <button class="shop-btn" data-amount="50">+50€</button>
    <button class="shop-btn" data-amount="100">+100€</button>
    <button class="shop-btn" data-amount="250">+250€</button>

    <br><br>
    <button id="closeShop">Cerrar</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
